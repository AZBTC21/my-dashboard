<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Jonathan Hansen's Dashboard</h1>
    
    <!-- Time & Weather Row -->
    <div class="row">
      <div class="widget" id="clock">Loading times...</div>
      <div class="widget" id="weather">Loading weather...</div>
    </div>

    <!-- Markets -->
    <div class="widget">
      <h2>Markets</h2>
      <div id="markets">Loading prices...</div>
    </div>

    <!-- News -->
    <div class="widget">
      <h2>News</h2>
      <div id="news">Loading news...</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
