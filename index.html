<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold mb-8 text-center">My Personal Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Clock -->
      <div class="bg-zinc-900 rounded-2xl p-6">
        <h2 class="text-xl font-semibold mb-4">🕒 Time</h2>
        <div id="clock" class="text-sm font-mono leading-tight tracking-tight"></div>
      </div>

      <!-- Weather -->
      <div class="bg-zinc-900 rounded-2xl p-6">
        <h2 class="text-xl font-semibold mb-4">🌤️ Weather</h2>
        <div id="weather" class="text-3xl"></div>
      </div>

      <!-- Markets -->
      <div class="bg-zinc-900 rounded-2xl p-6 lg:col-span-1">
        <h2 class="text-xl font-semibold mb-4">📈 Markets</h2>
        <div id="markets" class="space-y-2 text-sm"></div>
      </div>

      <!-- Sports Scores -->
      <div class="bg-zinc-900 rounded-2xl p-6 lg:col-span-3">
        <h2 class="text-xl font-semibold mb-4">🏟️ Sports Scores</h2>
        <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
          <div class="flex gap-2">
            <button id="sportsTabNFL" class="sports-tab sports-tab-active">NFL</button>
            <button id="sportsTabNBA" class="sports-tab">NBA</button>
            <button id="sportsTabMLB" class="sports-tab">MLB</button>
          </div>
          <div class="text-xs text-zinc-400">
            <span id="sportsLastUpdated">Updated just now</span>
            · Refresh every 3m
          </div>
        </div>
        <div id="sportsStatusText" class="text-sm text-zinc-500 mb-4">Showing latest scores and standings.</div>
        <div id="sportsContent" class="sports-scroll">
          <div id="sportsNFL" class="league-panel"></div>
          <div id="sportsNBA" class="league-panel hidden"></div>
          <div id="sportsMLB" class="league-panel hidden"></div>
        </div>
      </div>

      <!-- Bitcoin Chart -->
      <div class="bg-zinc-900 rounded-2xl p-6 lg:col-span-2">
        <h2 class="text-xl font-semibold mb-4">₿ Bitcoin (1 day minutely)</h2>
        <canvas id="btcChart" height="120"></canvas>
      </div>

      <!-- Top News -->
      <div class="bg-zinc-900 rounded-2xl p-6 lg:col-span-3">
        <h2 class="text-xl font-semibold mb-4">📰 Top News</h2>
        <div id="news" class="space-y-3"></div>
      </div>

      <!-- Sports News -->
      <div class="bg-zinc-900 rounded-2xl p-6">
        <h2 class="text-xl font-semibold mb-4">🏈 Sports News</h2>
        <div id="sportsNews" class="space-y-3"></div>
      </div>

      <!-- Business News -->
      <div class="bg-zinc-900 rounded-2xl p-6">
        <h2 class="text-xl font-semibold mb-4">💼 Business News</h2>
        <div id="businessNews" class="space-y-3"></div>
      </div>

      <!-- AI News -->
      <div class="bg-zinc-900 rounded-2xl p-6">
        <h2 class="text-xl font-semibold mb-4">🤖 AI News</h2>
        <div id="aiNews" class="space-y-3"></div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
